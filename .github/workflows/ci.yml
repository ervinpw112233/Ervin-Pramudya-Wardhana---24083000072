name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.22'

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: Test and Build Backend
      working-directory: ./backend
      run: |
        go mod tidy
        go build -v ./...

    - name: Build Frontend
      working-directory: ./frontend
      run: |
        npm install
        npm run build

  docker-build:
    needs: test-and-build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3

    - name: Build Backend Docker Image
      run: docker build -t myregistry/backend:latest ./backend
      
    - name: Build Frontend Docker Image
      run: docker build -t myregistry/frontend:latest ./frontend

