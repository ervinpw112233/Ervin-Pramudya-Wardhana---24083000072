version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-prod_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-prod_db}
    volumes:
      - prod_pgdata:/var/lib/postgresql/data

  backend:
    image: ${DOCKER_REGISTRY:-myregistry}/backend:latest
    restart: always
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-prod_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-prod_db}?sslmode=disable
    depends_on:
      - db

  frontend:
    image: ${DOCKER_REGISTRY:-myregistry}/frontend:latest
    restart: always
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend

volumes:
  prod_pgdata:
